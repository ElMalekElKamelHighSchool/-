<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هيئة التدريس | الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .teacher-card { transition: all 0.4s ease; border-radius: 30px; overflow: hidden; background: white; }
        .teacher-card:hover { transform: translateY(-10px); shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .teacher-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .consultant-footer { background: #001f3f; color: #b49248; text-align: center; padding: 20px; font-weight: 900; }
    </style>
</head>
<body>

    <header class="bg-blue-900 text-white py-16 text-center rounded-b-[50px] shadow-2xl">
        <h1 class="text-4xl md:text-6xl font-black mb-4">نخبة المعلمين</h1>
        <p class="text-blue-200 font-bold">قادة الفكر وبناة أجيال الملك الكامل الثانوية العسكرية</p>
        <a href="index.html" class="inline-block mt-8 bg-white text-blue-900 px-6 py-2 rounded-full font-black text-sm hover:bg-yellow-500 transition">العودة للرئيسية</a>
    </header>

    <main class="container mx-auto px-6 py-20">
        <div id="teachersGrid" class="grid lg:grid-cols-3 md:grid-cols-2 gap-10">
            </div>
    </main>

    <footer class="consultant-footer">
        <p>جميع الحقوق محفوظة © <span id="year"></span> | مدرسة الملك الكامل العسكرية</p>
        <p class="text-sm mt-2">أنشئ بواسطة <span class="text-white">المستشار</span> 👑</p>
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        const firebaseConfig = {
            apiKey: "AIzaSyCSwNiOHDC0m6zoBx_BeAGyaE33Zmhuvi4",
            authDomain: "hazoma-60ed2.firebaseapp.com",
            projectId: "hazoma-60ed2",
            storageBucket: "hazoma-60ed2.firebasestorage.app",
            messagingSenderId: "962438384604",
            appId: "1:962438384604:web:52db16e5723a8f6d3bdd19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection('teachers').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const grid = document.getElementById('teachersGrid');
            grid.innerHTML = '';
            
            snap.docs.forEach(doc => {
                const t = doc.data();
                grid.innerHTML += `
                    <div class="teacher-card p-8 shadow-sm border border-gray-100 flex flex-col items-center text-center">
                        <img src="${t.image}" class="teacher-img mb-6" alt="${t.name}">
                        <span class="bg-red-50 text-red-700 px-4 py-1 rounded-full text-xs font-black mb-4">${t.subject}</span>
                        <h3 class="text-2xl font-black text-blue-900 mb-4">${t.name}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed mb-6 font-semibold">${t.bio}</p>
                        <div class="flex gap-4 text-blue-900 opacity-30">
                            <i class="fas fa-graduation-cap"></i>
                            <i class="fas fa-certificate"></i>
                            <i class="fas fa-award"></i>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
