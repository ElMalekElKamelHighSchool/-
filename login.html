<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المنصة | الملك الكامل العسكرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-blue-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900">تسجيل الدخول</h1>
            <p class="text-gray-500 text-sm">منصة مدرسة الملك الكامل الثانوية العسكرية</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <input type="email" id="email" placeholder="البريد الإلكتروني (جيميل)" class="w-full border-b-2 border-gray-300 p-2 focus:border-blue-900 outline-none" required>
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full border-b-2 border-gray-300 p-2 focus:border-blue-900 outline-none" required>
            
            <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg">
                دخول للمنصة
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm">
            <a href="signup.html" class="text-blue-900 hover:underline">ليس لديك حساب؟ سجل الآن</a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (user.emailVerified) {
                    // جلب دور المستخدم (طالب/معلم/أدمن) لتوجيهه
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        // توجيه ذكي بناءً على الدور
                        if (userData.role === 'admin') window.location.href = 'admin-dashboard.html';
                        else window.location.href = 'dashboard.html';
                    }
                } else {
                    alert("يرجى تفعيل حسابك من خلال الرابط المرسل إلى بريدك الإلكتروني أولاً.");
                }
            } catch (error) {
                alert("خطأ في البيانات: تأكد من الإيميل وكلمة المرور");
            }
        };
    </script>
</body>
</html>
