<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النتائج الرسمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }</style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto text-center">
        <h1 class="text-3xl font-black mb-8 text-yellow-400">نتائج مدرسة الملك الكامل</h1>
        
        <div id="searchArea" class="bg-slate-800 p-6 rounded-3xl shadow-2xl mb-10">
            <input id="secretInput" type="text" placeholder="أدخل رقم الجلوس السري (ZOMA-XXXXXX)" class="w-full p-4 rounded-xl text-black text-center font-bold outline-none mb-4">
            <button onclick="getFinalResult()" class="w-full bg-yellow-500 text-blue-900 p-4 rounded-xl font-black hover:bg-white transition">استعلام الآن</button>
        </div>

        <div id="resultDisplay" class="hidden bg-white text-slate-900 p-8 rounded-[40px] shadow-2xl relative overflow-hidden">
            </div>
    </div>

    <script>
        // نفس إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCSwNiOHDC0m6zoBx_BeAGyaE33Zmhuvi4",
            authDomain: "hazoma-60ed2.firebaseapp.com",
            projectId: "hazoma-60ed2",
            storageBucket: "hazoma-60ed2.firebasestorage.app",
            messagingSenderId: "962438384604",
            appId: "1:962438384604:web:52db16e5723a8f6d3bdd19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. البحث التلقائي من الرابط (QR Code)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(id) {
                document.getElementById('secretInput').value = id;
                getFinalResult(id);
            }
        };

        async function getFinalResult(manualID) {
            const id = manualID || document.getElementById('secretInput').value;
            const res = await db.collection('results').doc(id).get();
            
            if(!res.exists) return alert("رقم سري خاطئ أو غير مفعل!");

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            const data = res.data();
            const display = document.getElementById('resultDisplay');
            display.classList.remove('hidden');
            
            let tableHTML = `<h2 class="text-2xl font-black text-blue-900 mb-2">${data['الاسم']}</h2>
                             <p class="text-sm text-gray-500 mb-6">تهانينا على نجاحك المتميز</p>
                             <table class="w-full border-collapse">`;
            
            for (let key in data) {
                if(!['secretID', 'oldID', 'timestamp', 'الاسم'].includes(key)) {
                    tableHTML += `<tr class="border-b"><td class="py-2 text-right font-bold text-gray-600">${key}</td>
                                  <td class="py-2 text-left font-black text-blue-900">${data[key]}</td></tr>`;
                }
            }
            tableHTML += `</table><button onclick="window.print()" class="mt-6 bg-blue-900 text-white px-8 py-2 rounded-full text-sm">طباعة النتيجة</button>`;
            display.innerHTML = tableHTML;
        }
    </script>
</body>
</html>
