<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب | مدرسة الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-900 to-black min-h-screen flex items-center justify-center font-['Cairo'] p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
        <h2 class="text-2xl font-black text-center text-blue-900 mb-6">إنشاء حساب جديد</h2>
        <form id="signupForm" class="space-y-4">
            <input type="text" id="name" placeholder="الاسم الرباعي" class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-900" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-900" required>
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-3 border-2 rounded-xl outline-none focus:border-blue-900" required>
            <button type="submit" class="w-full bg-yellow-500 text-blue-900 font-bold py-3 rounded-xl hover:bg-yellow-400 transition">إنشاء الحساب</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('name').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                const role = email.endsWith('@admin.com') ? 'admin' : 'student';

                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    role: role,
                    createdAt: new Date()
                });

                window.location.href = (role === 'admin') ? 'admin-dashboard.html' : 'dashboard.html';
            } catch (error) { alert("حدث خطأ: " + error.message); }
        };
    </script>
</body>
</html>
