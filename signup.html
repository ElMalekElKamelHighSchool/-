<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب | مدرسة الملك الكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-black min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
        <h2 class="text-3xl font-black text-blue-900 text-center mb-6">إنشاء حساب جديد</h2>
        
        <form id="signupForm" class="space-y-4">
            <select id="role" class="w-full p-3 rounded-xl border-2 border-gray-100 outline-none focus:border-blue-900" required>
                <option value="">أنا (طالب / ولي أمر)</option>
                <option value="student">طالب بالمدرسة</option>
                <option value="parent">ولي أمر</option>
            </select>

            <input type="text" id="fullName" placeholder="الاسم الرباعي" class="w-full p-3 rounded-xl border-2 border-gray-100 outline-none focus:border-blue-900" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني (Gmail)" class="w-full p-3 rounded-xl border-2 border-gray-100 outline-none focus:border-blue-900" required>
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full p-3 rounded-xl border-2 border-gray-100 outline-none focus:border-blue-900" required>
            
            <div id="studentExtra" class="hidden">
                <select id="grade" class="w-full p-3 rounded-xl border-2 border-blue-50 bg-blue-50">
                    <option value="1sec">الصف الأول الثانوي</option>
                    <option value="2sec">الصف الثاني الثانوي</option>
                    <option value="3sec">الصف الثالث الثانوي</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl hover:bg-blue-800 transition shadow-lg">
                إنشاء الحساب والدخول فوراً
            </button>
        </form>
        
        <p class="text-center mt-6 text-gray-600">لديك حساب بالفعل؟ <a href="login.html" class="text-blue-900 font-bold underline">سجل دخولك</a></p>
    </div>

    <script type="module">
        import { auth, db } from './config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const roleSelect = document.getElementById('role');
        roleSelect.onchange = () => {
            document.getElementById('studentExtra').classList.toggle('hidden', roleSelect.value !== 'student');
        };

        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const role = roleSelect.value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // حفظ البيانات في Firestore فوراً
                await setDoc(doc(db, "users", user.uid), {
                    fullName: document.getElementById('fullName').value,
                    role: role,
                    grade: role === 'student' ? document.getElementById('grade').value : "parent_mode",
                    createdAt: new Date()
                });

                alert("تم إنشاء الحساب بنجاح! جاري تحويلك...");
                window.location.href = role === 'student' ? 'dashboard.html' : 'parent-dashboard.html';
                
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };
    </script>
</body>
</html>
