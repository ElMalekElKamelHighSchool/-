<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طباعة الجدول الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; padding: 20px; background: white; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 2px solid black; }
        th, td { border: 1px solid black; padding: 12px; text-align: center; font-weight: bold; }
        th { background: #f0f0f0; color: #001f3f; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print bg-blue-900 text-white p-4 mb-6 flex justify-between rounded-lg">
        <span>معاينة الجدول الدراسي</span>
        <button onclick="window.print()" class="bg-yellow-500 text-black px-4 py-1 rounded font-bold">طباعة الجدول <i class="fas fa-print"></i></button>
    </div>

    <div class="text-center border-4 border-double border-black p-6">
        <h1 class="text-2xl font-black mb-2">مدرسة الملك الكامل الثانوية العسكرية بنين</h1>
        <h2 id="gradeTitle" class="text-xl font-bold text-red-700 mb-6 underline"></h2>
        
        <div id="tableContainer"></div>

        <div class="grid grid-cols-3 mt-12 text-center font-bold">
            <div>يعتمد،، مدير المدرسة</div>
            <div>وكيل شؤون الطلاب</div>
            <div>رئيس الكنترول</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSwNiOHDC0m6zoBx_BeAGyaE33Zmhuvi4",
            authDomain: "hazoma-60ed2.firebaseapp.com",
            projectId: "hazoma-60ed2",
            storageBucket: "hazoma-60ed2.firebasestorage.app",
            messagingSenderId: "962438384604",
            appId: "1:962438384604:web:52db16e5723a8f6d3bdd19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const grade = params.get('grade');

        async function load() {
            const doc = await db.collection('schedules').doc(grade).get();
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('gradeTitle').innerText = "جدول حصص " + (grade === 'grade1' ? 'الصف الأول' : grade === 'grade2' ? 'الصف الثاني' : 'الصف الثالث');
                document.getElementById('tableContainer').innerHTML = data.lessons;
            } else {
                document.body.innerHTML = "<h1>عذراً، الجدول غير متاح حالياً</h1>";
            }
        }
        load();
    </script>
</body>
</html>
